<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="Valora mark">
  <defs>
    <!-- V fill: cyan → violet → deep violet -->
    <linearGradient id="vGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="52%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <!-- Hex border: cyan → violet → faded cyan -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.45"/>
    </linearGradient>
    <!-- Glow filter for nodes -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft blur for glow halo behind V -->
    <filter id="softBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Soft glow halo beneath V (blurred, low opacity) -->
  <polygon points="42,55 58,55 100,155 142,55 158,55 100,165"
           fill="#6d28d9" filter="url(#softBlur)" opacity="0.45"/>

  <!-- Hexagon background -->
  <polygon points="100,8 180,54 180,146 100,192 20,146 20,54"
           fill="#0b1422"/>

  <!-- Hexagon border -->
  <polygon points="100,8 180,54 180,146 100,192 20,146 20,54"
           fill="none" stroke="url(#hexGrad)" stroke-width="1.5" opacity="0.88"/>

  <!-- Main V shape -->
  <polygon points="42,55 58,55 100,155 142,55 158,55 100,165"
           fill="url(#vGrad)"/>

  <!-- V inner edge sheen -->
  <polygon points="42,55 58,55 100,155 142,55 158,55 100,165"
           fill="none" stroke="rgba(0,212,255,0.22)" stroke-width="0.8"/>

  <!-- Pipeline connector lines -->
  <line x1="20" y1="100" x2="42" y2="100" stroke="#00d4ff" stroke-width="1.2" opacity="0.3"/>
  <line x1="158" y1="100" x2="180" y2="100" stroke="#00d4ff" stroke-width="1.2" opacity="0.3"/>
  <circle cx="20"  cy="100" r="2.5" fill="#00d4ff" opacity="0.35"/>
  <circle cx="180" cy="100" r="2.5" fill="#00d4ff" opacity="0.35"/>

  <!-- Entry nodes (top of each arm) -->
  <circle cx="42"  cy="55" r="4" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="158" cy="55" r="4" fill="#00d4ff" filter="url(#glow)"/>

  <!-- Circuit nodes — left arm -->
  <circle cx="64"  cy="82"  r="2.5" fill="#00d4ff" opacity="0.75"/>
  <circle cx="76"  cy="103" r="2"   fill="#00d4ff" opacity="0.48"/>
  <circle cx="88"  cy="126" r="2"   fill="#8b5cf6" opacity="0.6"/>

  <!-- Circuit nodes — right arm -->
  <circle cx="136" cy="82"  r="2.5" fill="#00d4ff" opacity="0.75"/>
  <circle cx="124" cy="103" r="2"   fill="#00d4ff" opacity="0.48"/>
  <circle cx="112" cy="126" r="2"   fill="#8b5cf6" opacity="0.6"/>

  <!-- Bracket decorations -->
  <path d="M 26,83 L 20,83 L 20,117 L 26,117"
        fill="none" stroke="#00d4ff" stroke-width="1"
        opacity="0.22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 174,83 L 180,83 L 180,117 L 174,117"
        fill="none" stroke="#00d4ff" stroke-width="1"
        opacity="0.22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Apex node -->
  <circle cx="100" cy="160" r="7.5" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="100" cy="160" r="3.5" fill="white"/>
</svg>
