version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      production-deps:
        dependency-type: 'production'
        update-types: ['minor', 'patch']
      dev-deps:
        dependency-type: 'development'
        update-types: ['minor', 'patch']
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    versioning-strategy: 'increase'
